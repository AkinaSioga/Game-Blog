baseURL: https://akinasuki.love/
locale: zh-CN
title: Dasvidaniya
theme: reimu

params:
  author: Denia.
  avatar: "github-avatar.png"
  email: 2648247502@qq.com
  description: "我希望有一个名字，再有一个生日"
  subtitle:
    text: "只要执着的够久，故事一定就会迎来好结局，不是吗？"

  # 攻略站使用 games Section 作为内容主体
  mainSections: ["games"]
  dateFormat: "2006-01-02"
  timeFormat: "2006-01-02 15:04:05"

  # 导航菜单 — 顶部 Header 主入口
  menu:
    - name: 首页
      url: ""
    - name: 游戏攻略
      url: "games"
    - name: CS2 服务器
      url: "cs2-servers"

  # 深色模式 — 默认跟随系统
  dark_mode:
    enable: auto

  # 侧边栏 — 关闭菜单链接
  sidebar:
    position: right
    menu: false

  # 小组件 — 攻略站仅保留分类与标签组件
  widgets:
    - category
    - tag

  # Preloader 加载动画
  preloader:
    enable: true

  # 灵梦光标
  reimu_cursor:
    enable: false

  # 烟花特效
  firework:
    enable: true

  # Pace 加载条
  pace:
    enable: true

  # 代码块 — 默认展开
  code_block:
    expand: true

  # KaTeX 数学公式
  math:
    katex:
      enable: true
    mathjax:
      enable: false

  # 社交链接
  social:
    github: https://github.com/AkinaSioga

  # Footer
  footer:
    since: 2026
    powered: true
    count: true

  # 回到顶部按钮
  top:
    enable: true
    position: right

  # 注入自定义 CSS（通过主题 injector 机制，不替换主题文件）
  injector:
    head_end: '<link rel="stylesheet" href="/css/custom.css?v=20260610-title1">'
    body_end: '<script defer src="/js/denia-cursor.js"></script>'

  # 自定义 Banner / 背景图
  banner: "images/custom/banner.png"
